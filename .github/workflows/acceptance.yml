# Terraform Provider acceptance testing workflow.
name: Acceptance Tests

# Acceptance tests create real resources against the live Daytona API, so they
# run on pushes to main and on demand rather than on every pull request.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

# Acceptance tests create named resources in a shared live account; never run
# two workflows concurrently.
concurrency:
  group: acceptance-tests
  cancel-in-progress: false

jobs:
  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - run: go mod download
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_HEALTH_CHECK_API_KEY: ${{ secrets.DAYTONA_HEALTH_CHECK_API_KEY }}
        run: go test -v -run TestAcc ./internal/provider/
        timeout-minutes: 20
