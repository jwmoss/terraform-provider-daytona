name: Feature request
description: Suggest a new resource, data source, action, or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: The use case or problem this feature would solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like the provider to do. If it maps to a Daytona API endpoint, link it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have tried or considered, including SDK or CLI workarounds.
    validations:
      required: false
